# Cloudflare Worker config for the alea static dashboards.
#
# We don't ship a Worker script — just a directory of static assets that
# Wrangler serves directly. The directory is populated by `bun alea
# dashboards:build` (or `dashboards:build --deploy`, which also runs
# `bunx wrangler deploy`). Cloudflare's static-asset router maps
# `/exploration/` to `./tmp/web/exploration/index.html` automatically;
# the live trading PnL page lives at the worker root.
#
# Hosted at https://alea.nickcherryjiggz.workers.dev — the worker name
# `alea` resolves to that subdomain on the workers.dev zone.
name = "alea"
compatibility_date = "2026-05-01"

[assets]
directory = "./tmp/web"
